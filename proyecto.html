<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Tiempo Real</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="background"></div>

<div class="container">
  <h1>✨ Dashboard en Vivo</h1>

  <div class="grid">
    <div class="card">
      <h2>🕒 Hora</h2>
      <p id="time">--:--:--</p>
    </div>

    <div class="card">
      <h2>📅 Fecha</h2>
      <p id="date">Cargando...</p>
    </div>

    <div class="card">
      <h2>📍 Ubicación</h2>
      <p id="location">Obteniendo...</p>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
